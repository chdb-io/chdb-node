name: prebuild-publish

# On a version tag: build the per-platform @chdb/lib-* native subpackages on
# each target runner and publish them, then publish the thin main `chdb` package
# (which pulls the subpackages in via optionalDependencies). No QEMU — native
# arm runners are used directly.
#
# Gated on update_libchdb.sh pointing at a libchdb release that includes
# #73 (chdb_query_with_params) and #15 (chdb_query_arrow).

on:
  push:
    tags: ["v*"]

jobs:
  subpackages:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, plat: linux-x64-gnu }
          - { os: ubuntu-24.04-arm, plat: linux-arm64-gnu }
          - { os: macos-14, plat: darwin-arm64 }
          - { os: macos-15-intel, plat: darwin-x64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"
      - name: Install patchelf + binutils (linux rpath fixup + relocatability assert)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y patchelf binutils
      - run: npm install --ignore-scripts
      - run: npm run libchdb
      - run: npm run build
      - run: npm run test:all
      - name: Derive libchdb version from update_libchdb.sh
        run: |
          REL=$(grep -E '^LATEST_RELEASE=' update_libchdb.sh | cut -d= -f2)
          echo "CHDB_LIB_VERSION=${REL#v}" >> "$GITHUB_ENV"
      - name: Build subpackage
        run: npm run build:platform
      - name: Publish subpackage (idempotent — skip or tolerate already-published)
        working-directory: npm/@chdb/lib-${{ matrix.plat }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VER" version >/dev/null 2>&1; then
            echo "$NAME@$VER already published; skipping (lets a re-run finish a partially-published release)."
            exit 0
          fi
          # Publish; tolerate the race where the version exists but the registry
          # read above lagged — key off the publish error, not a (lagging) read.
          if out=$(npm publish --access public 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -qiE "cannot publish over|previously published|EPUBLISHCONFLICT|403" \
              && echo "$NAME@$VER already on the registry (publish conflict); treating as success." \
              || exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  main:
    needs: subpackages
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for npm publish --provenance (OIDC attestation)
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: "https://registry.npmjs.org"
      - run: npm install --ignore-scripts
      - name: Set main version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"
          if [[ "$VERSION" == *-* ]]; then
            echo "NPM_DIST_TAG=next" >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi
      - name: Publish main (prepack builds dist; idempotent)
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "chdb@$VER" version >/dev/null 2>&1; then
            echo "chdb@$VER already published; skipping."
            exit 0
          fi
          if out=$(npm publish --provenance --access public --tag "$NPM_DIST_TAG" 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -qiE "cannot publish over|previously published|EPUBLISHCONFLICT|403" \
              && echo "chdb@$VER already on the registry (publish conflict); treating as success." \
              || exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
