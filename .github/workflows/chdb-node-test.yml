name: test

on:
  pull_request:
    branches: ["main"]
    paths-ignore: ["**/*.md"]
  push:
    branches: ["main"]
    paths-ignore: ["**/*.md"]

# update_libchdb.sh pins the published chdb-core v26.5.0 libchdb, which ships
# chdb_query_with_params (#73) and chdb_query_arrow (#15) across all four target
# platforms, so the full v2 + v3 suite is expected green here.

# Harden the registry fetch so a transient reset (e.g. ECONNRESET during
# install) retries instead of reddening the job. Combined with the per-job
# actions/setup-node `cache: npm`, most runs never hit the network at all.
env:
  npm_config_fetch_retries: "5"
  npm_config_fetch_retry_mintimeout: "20000"
  npm_config_fetch_retry_maxtimeout: "120000"
  npm_config_fetch_timeout: "600000"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, macos-15-intel]
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install JS deps (no compile-on-install)
        run: npm install --ignore-scripts
      - name: Fetch libchdb
        run: npm run libchdb
      - name: Build (addon + dist)
        run: npm run build
      - name: Exercise the freshly built addon (not the published prebuilt)
        # The loader prefers the published @chdb/lib-<platform> subpackage over a
        # local build (see dist/loader.js). That published binary lags behind
        # in-repo native source — e.g. the Layer 3 Arrow C Data Interface methods
        # (ArrowRegisterColumns/…) only exist once republished. Drop the installed
        # subpackage so loadNative() falls through to the just-built
        # build/Release/chdb_node.node and the suite tests this PR's native source.
        shell: bash
        run: rm -rf node_modules/@chdb/lib-*
      - name: Test (v2 mocha + v3 vitest)
        run: npm run test:all

  runtimes:
    # Best-effort smoke that the N-API binary loads under Bun and Deno.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm install --ignore-scripts && npm run libchdb && npm run build
      - uses: oven-sh/setup-bun@v2
      - name: Bun smoke
        run: bun -e "const {query}=require('./index.js'); if(query('SELECT 1','CSV').trim()!=='1') process.exit(1); console.log('bun ok')"
      - uses: denoland/setup-deno@v2
        with:
          deno-version: vx.x.x
      - name: Deno smoke
        run: |
          # newer Deno dropped `deno run -e`; run a script file instead (the
          # relative import resolves from this file's dir = the repo root)
          cat > deno-smoke.mjs <<'EOF'
          import { query } from './index.mjs'
          if (query('SELECT 1', 'CSV').trim() !== '1') Deno.exit(1)
          console.log('deno ok')
          EOF
          deno run --allow-read --allow-ffi --allow-env deno-smoke.mjs

  cleanroom:
    # Install the BUILT artifacts (thin main + this platform's @chdb/lib-*
    # subpackage) into a fresh project and run the end-to-end smoke against the
    # installed `chdb` package — the Node analogue of chDB Python's "pip install
    # the built wheel, then run the suite". Proves the published shape actually
    # loads and runs, not just the in-repo source.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y patchelf binutils
      - run: npm install --ignore-scripts && npm run libchdb && npm run build
      - name: Pack main + platform subpackage
        run: |
          # Stamp the subpackage with the SAME version main pins in
          # optionalDependencies (derived from update_libchdb.sh, as the publish
          # workflow does). Without this the local build is 0.0.0-dev, which does
          # NOT satisfy main's pin, so `npm install` silently pulls the PUBLISHED
          # subpackage from the registry — the cleanroom then tests the released
          # binary instead of the one just built, which is how a non-relocatable
          # binary (chdb-io/chdb-node#50) shipped past a green cleanroom.
          export CHDB_LIB_VERSION="$(grep -E '^LIBCHDB_NPM_VERSION=' update_libchdb.sh | cut -d= -f2)"
          npm run build:platform
          MAIN_TGZ="$PWD/$(npm pack --silent)"
          SUB_DIR="$PWD/npm/@chdb/lib-linux-x64-gnu"
          SUB_TGZ="$SUB_DIR/$(cd "$SUB_DIR" && npm pack --silent)"
          echo "MAIN_TGZ=$MAIN_TGZ" >> "$GITHUB_ENV"
          echo "SUB_TGZ=$SUB_TGZ" >> "$GITHUB_ENV"
      - name: Install into a clean project and run e2e
        run: |
          mkdir -p /tmp/cleanroom && cd /tmp/cleanroom
          npm init -y >/dev/null
          npm install --no-save "$SUB_TGZ" "$MAIN_TGZ"
          # The exact binary that will be dlopen'd must be relocatable. Assert it
          # directly on the INSTALLED file — this also fails loudly (instead of a
          # cryptic dlopen error) if npm resolved the subpackage from the registry
          # rather than the local tgz.
          INSTALLED_NODE="node_modules/@chdb/lib-linux-x64-gnu/chdb_node.node"
          bash "$GITHUB_WORKSPACE/scripts/assert-relocatable.sh" "$INSTALLED_NODE"
          cp "$GITHUB_WORKSPACE/scripts/smoke-e2e.mjs" ./smoke-e2e.mjs
          # Relocation-faithful e2e: delete the build-machine libchdb.so so a
          # baked absolute/build-dir library reference (chdb-io/chdb-node#50)
          # can no longer be satisfied from the build tree. The installed package
          # must resolve libchdb.so from the subpackage via $ORIGIN alone —
          # exactly what a real user's machine offers. Without this the test
          # passes on the build runner even when the binary is unshippable.
          rm -f "$GITHUB_WORKSPACE/libchdb.so"
          node smoke-e2e.mjs
