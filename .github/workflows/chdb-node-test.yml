name: test

on:
  pull_request:
    branches: ["main"]
    paths-ignore: ["**/*.md"]
  push:
    branches: ["main"]
    paths-ignore: ["**/*.md"]

# NOTE: green CI is gated on update_libchdb.sh pointing at a published libchdb
# that includes chdb_query_with_params (#73) and chdb_query_arrow (#15). Until
# that upstream release is out, the v3 (vitest) suite will fail against the
# v26.3.0 libchdb. The workflow structure itself is final.

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14, macos-13]
        node-version: [18.x, 20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install JS deps (no compile-on-install)
        run: npm install --ignore-scripts
      - name: Fetch libchdb
        run: npm run libchdb
      - name: Build (addon + dist)
        run: npm run build
      - name: Test (v2 mocha + v3 vitest)
        run: npm run test:all

  runtimes:
    # Best-effort smoke that the N-API binary loads under Bun and Deno.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm install --ignore-scripts && npm run libchdb && npm run build
      - uses: oven-sh/setup-bun@v2
      - name: Bun smoke
        run: bun -e "const {query}=require('./index.js'); if(query('SELECT 1','CSV').trim()!=='1') process.exit(1); console.log('bun ok')"
      - uses: denoland/setup-deno@v2
        with:
          deno-version: vx.x.x
      - name: Deno smoke
        run: deno run --allow-read --allow-ffi --allow-env -e "import { query } from './index.mjs'; if (query('SELECT 1','CSV').trim() !== '1') Deno.exit(1); console.log('deno ok')"
